version: '3.8'

services:
  # PHP-FPM Container
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school-portal-php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - school-network
    environment:
      - DB_CONNECTION=sqlite

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: school-portal-nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - school-network

networks:
  school-network:
    driver: bridge
